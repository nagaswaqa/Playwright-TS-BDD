# ZAP passive-scan suppression baseline.
#
# Each non-comment, non-blank line lists a single ZAP alert id that
# `Stop-Zap.ps1` will deactivate before generating the report. Add an
# inline comment after a tab to record why the suppression was added —
# the comment is ignored by the loader but is read by humans on review.
#
# Find the alert id in the `pluginid` field of any entry in
# `reports/security/zap-report-<ts>.json`, or in the alert's URL path
# inside the HTML report.
#
# Workflow:
#   1. Run `npm run test:security -- -FailOn Off` once.
#   2. Open `reports/security/zap-report-<ts>.html`.
#   3. For every finding you've decided to accept, copy its pluginid here
#      with a tab-separated rationale.
#   4. Re-run `npm run test:security` (default `-FailOn High`) — the
#      suppressed alerts disappear from the report and stop blocking CI.
#   5. When the underlying issue is fixed, delete the line so future
#      regressions are caught.
#
# ─── Pre-seeded suggestions for the dev SIS at http://145.241.185.96 ────
# These are almost guaranteed to fire on a plain-HTTP demo host. Each
# line is COMMENTED OUT — uncomment after your first run confirms the
# finding and you've decided to accept it. Don't enable them blindly:
# every suppression is a risk you've explicitly chosen to ignore.
#
# 10035		Strict-Transport-Security header missing — accepted while dev host is plain HTTP. Revisit when staging is HTTPS.
# 10038		Content Security Policy header missing — accepted while CSP rollout is in progress.
# 10020		X-Frame-Options header missing — internal-only app, click-jacking risk minimal.
# 10021		X-Content-Type-Options header missing — accepted on dev; revisit before prod.
# 10054		Cookie without SameSite attribute — accepted on dev (HTTP); session cookies should be SameSite=Lax minimum on staging.
# 10063		Permissions-Policy header missing — low priority, revisit after CSP/HSTS land.
# 10096		Timestamp disclosure (Unix) — informational; revisit if a real timestamp is leaked.
# 10202		Absence of Anti-CSRF tokens — confirm this is the SPA / API-only context where CSRF tokens aren't expected.
