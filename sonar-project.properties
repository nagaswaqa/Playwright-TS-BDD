# SonarCloud project configuration.
#
# Used by the SonarSource scan action in `.github/workflows/sonarcloud.yml`.
# Quality-gate behaviour itself (which conditions block a merge) is set in
# the SonarCloud UI under Project Settings → Quality Gate.
#
# Maintenance:
#   - Update `sonar.projectKey` if the GitHub repo or org is renamed.
#   - Add new generated/output paths to `sonar.exclusions` so they don't
#     pollute duplication / smell metrics.

sonar.projectKey=nagaswaqa_Playwright-TS-BDD
sonar.organization=nagaswaqa

sonar.projectName=Playwright-TS-BDD
sonar.projectVersion=1.0

# Source layout — analyse the framework code and the runnable specs.
sonar.sources=src,scripts,config,resources/recorder-step-rules.json,resources/recorder-script.js
sonar.tests=features

# Generated outputs and operator artefacts must be excluded so they don't
# count toward bugs / smells / duplications. If you add a new generated
# path, add it here too.
sonar.exclusions=**/*.feature.spec.{ts,js},.features-gen/**,node_modules/**,reports/**,recordings/**,healing-logs/**,logs/**,dist/**,.auth/**,.zap/**,.playwright-mcp/**,eng.traineddata,resources/healing-cache.json

# Coverage is intentionally NOT configured. The suite is E2E-only, so the
# default Sonar coverage gate would block every PR until a coverage layer
# is added. When that lands, set:
#   sonar.javascript.lcov.reportPaths=coverage/lcov.info
# and re-enable "Coverage on New Code" in the Sonar quality gate.

sonar.sourceEncoding=UTF-8
